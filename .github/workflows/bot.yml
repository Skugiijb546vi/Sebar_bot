name: SEBAR Bot Non-Stop
on:
  workflow_dispatch: # ئەمە ڕێگەت پێ دەدات بە دەستی ڕەنی بکەیت

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install pyTelegramBotAPI requests
      - name: Run Bot
        env:
          BOT_TOKEN: "8524581086:AAGDZmzCO9ib3faKk8XvV3NfeLbwRNsvWhY"
          GITHUB_TOKEN: "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"
          REPO: "Skugiijb546vi/Sebar_bot"
        run: |
          python -c "
          import telebot, requests, os, time
          bot = telebot.TeleBot(os.getenv('BOT_TOKEN'))
          user_data = {}

          @bot.message_handler(func=lambda m: True)
          def ask(m):
              user_data[m.chat.id] = m.text
              markup = telebot.types.InlineKeyboardMarkup()
              markup.add(telebot.types.InlineKeyboardButton('1️⃣ تەنها دەنگ', callback_data='1'))
              markup.add(telebot.types.InlineKeyboardButton('2️⃣ دەنگ و ڕەنگ', callback_data='2'))
              markup.add(telebot.types.InlineKeyboardButton('3️⃣ تەنها ڤیدیۆ', callback_data='3'))
              markup.add(telebot.types.InlineKeyboardButton('4️⃣ بچووککردنەوە بۆ 70MB', callback_data='4'))
              bot.reply_to(m, '🎬 سێبار تیڤی ئامادەیە!\n🔗 فەرموو هەڵبژێرە چی بۆ ئەم لینکە بکەم؟', reply_markup=markup)

          @bot.callback_query_handler(func=lambda call: True)
          def run(call):
              url = user_data.get(call.message.chat.id)
              if not url:
                  bot.answer_callback_query(call.id, 'تکایە دووبارە لینکەکە بنێرەوە')
                  return
              
              bot.edit_message_text('⏳ فەرمانەکە نێردرا بۆ گیتھەب...', call.message.chat.id, call.message.message_id)
              
              res = requests.post(
                  f'https://api.github.com/repos/{os.getenv(\"REPO\")}/actions/workflows/main.yml/dispatches',
                  headers={'Authorization': f'token {os.getenv(\"GITHUB_TOKEN\")}', 'Accept': 'application/vnd.github.v3+json'},
                  json={'ref': 'main', 'inputs': {'video_url': url, 'mode': call.data}}
              )
              if res.status_code == 204:
                  bot.edit_message_text('🚀 گیتھەب دەستی بەکار کرد!\n✅ سەیری چەناڵەکەت بکە.', call.message.chat.id, call.message.message_id)
              else:
                  bot.edit_message_text(f'❌ هەڵە لە ناردن: {res.status_code}', call.message.chat.id, call.message.message_id)

          print('🤖 بۆتەکە چالاک بوو...')
          bot.infinity_polling()
          "
